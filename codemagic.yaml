      - name: Resolve available iOS simulator
        script: |
          set -e
          LINE="$(xcrun simctl list devices available | awk -v preferredDevice="$SIMULATOR_DEVICE" '
            /^-- / { runtime=$0; gsub(/^-- /, "", runtime); gsub(/ --$/, "", runtime) }
