workflows:
  ios-appstore:
    name: iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.voolo.jetx
      groups:
        - firebase
      vars:
        BUNDLE_ID: com.voolo.jetx
        FIREBASE_IOS_PLIST_PATH: ios/Runner/GoogleService-Info.plist
        VOOLO_IOS_MONTHLY_SUBSCRIPTION_ID: voolo
        VOOLO_IOS_YEARLY_SUBSCRIPTION_ID: voolo_y

    integrations:
      app_store_connect: app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Validate iOS release configuration
        script: |
          sh scripts/validate_ios_release.sh

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios
          pod install
          cd ..

      - name: Provision Firebase iOS plist
        script: |
          set -e
          if [ -n "$FIREBASE_IOS_PLIST_BASE64" ]; then
            echo "$FIREBASE_IOS_PLIST_BASE64" | base64 --decode > "$FIREBASE_IOS_PLIST_PATH"
            echo "Using Firebase iOS plist from Codemagic secret."
          elif [ -f "$FIREBASE_IOS_PLIST_PATH" ]; then
            echo "Using Firebase iOS plist from repository."
          else
            echo "ERROR: Firebase iOS plist not found in secret or repository."
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Print :GOOGLE_APP_ID" "$FIREBASE_IOS_PLIST_PATH" >/dev/null
          PLIST_BUNDLE_ID="$(/usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" "$FIREBASE_IOS_PLIST_PATH")"
          if [ "$PLIST_BUNDLE_ID" != "$BUNDLE_ID" ]; then
            echo "ERROR: Firebase iOS plist BUNDLE_ID ($PLIST_BUNDLE_ID) does not match app bundle ($BUNDLE_ID)."
            exit 1
          fi

      - name: Configure iOS URL scheme for Google Sign-In
        script: |
          set -e
          CLIENT_ID="$(/usr/libexec/PlistBuddy -c "Print :CLIENT_ID" "$FIREBASE_IOS_PLIST_PATH")"
          REVERSED_CLIENT_ID="$(/usr/libexec/PlistBuddy -c "Print :REVERSED_CLIENT_ID" "$FIREBASE_IOS_PLIST_PATH")"
          if [ -z "$CLIENT_ID" ]; then
            echo "ERROR: CLIENT_ID not found in Firebase iOS plist."
            exit 1
          fi
          if [ -z "$REVERSED_CLIENT_ID" ]; then
            echo "ERROR: REVERSED_CLIENT_ID not found in Firebase iOS plist."
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Delete :GIDClientID" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GIDClientID string $CLIENT_ID" ios/Runner/Info.plist
          if [ -n "${GOOGLE_WEB_CLIENT_ID:-}" ]; then
            /usr/libexec/PlistBuddy -c "Delete :GIDServerClientID" ios/Runner/Info.plist || true
            /usr/libexec/PlistBuddy -c "Add :GIDServerClientID string $GOOGLE_WEB_CLIENT_ID" ios/Runner/Info.plist
          fi
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleTypeRole string Editor" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED_CLIENT_ID" ios/Runner/Info.plist

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Verify signing settings
        script: |
          xcode-project show-build-settings --project ios/Runner.xcodeproj --scheme Runner | grep -E "CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_IDENTITY" || true

      - name: Set unique iOS build number
        script: |
          set -e
          BUILD_NO="${BUILD_NUMBER:-$CM_BUILD_ID}"
          if [ -z "$BUILD_NO" ]; then
            BUILD_NO="$(date +%s)"
          fi
          echo "CM_FLUTTER_BUILD_NUMBER=$BUILD_NO" >> "$CM_ENV"
          echo "Using iOS build number: $BUILD_NO"

      - name: Build signed IPA
        script: |
          set -e
          flutter build ipa --release \
            --build-number="$CM_FLUTTER_BUILD_NUMBER" \
            --dart-define=APP_STORE_REVIEW_MODE=true \
            --dart-define=VOOLO_IOS_MONTHLY_SUBSCRIPTION_ID="$VOOLO_IOS_MONTHLY_SUBSCRIPTION_ID" \
            --dart-define=VOOLO_IOS_YEARLY_SUBSCRIPTION_ID="$VOOLO_IOS_YEARLY_SUBSCRIPTION_ID"

      - name: Validate and collect IPA
        script: |
          set -e
          echo "Listing iOS build outputs..."
          find build/ios -type f | sed 's|^| - |'

          IPA_PATH="$(find build/ios/ipa -type f -name '*.ipa' 2>/dev/null | head -n 1 || true)"
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH="$(find build/ios -type f -name '*.ipa' | head -n 1 || true)"
          fi

          if [ -z "$IPA_PATH" ]; then
            ARCHIVE_PATH="$(find build/ios -type d -name '*.xcarchive' | head -n 1 || true)"
            if [ -z "$ARCHIVE_PATH" ]; then
              echo "ERROR: No .ipa file or .xcarchive was generated."
              exit 1
            fi

            echo "No IPA found. Exporting from archive: $ARCHIVE_PATH"
            cat > /tmp/exportOptions.plist <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store</string>
  <key>signingStyle</key>
  <string>automatic</string>
  <key>teamID</key>
  <string>VYJN27MQ6V</string>
  <key>stripSwiftSymbols</key>
  <true/>
  <key>uploadBitcode</key>
  <false/>
  <key>uploadSymbols</key>
  <true/>
</dict>
</plist>
EOF
            mkdir -p build/ios/ipa
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath build/ios/ipa \
              -exportOptionsPlist /tmp/exportOptions.plist
            IPA_PATH="$(find build/ios/ipa -type f -name '*.ipa' | head -n 1 || true)"
            if [ -z "$IPA_PATH" ]; then
              echo "ERROR: IPA export failed."
              exit 1
            fi
          fi

          mkdir -p build/ios/ipa
          cp "$IPA_PATH" build/ios/ipa/Runner.ipa
          find build/ios/ipa -type f -name '*.ipa' ! -name 'Runner.ipa' -delete
          echo "IPA ready at build/ios/ipa/Runner.ipa"

    artifacts:
      - build/ios/ipa/Runner.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  ios-screenshots:
    name: iOS Screenshots
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        SIMULATOR_DEVICE: "iPhone 14 Pro"
        SIMULATOR_RUNTIME: "iOS 16.2"
        SCREENSHOTS_DIR: "build/screenshots/iphone_69"

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Validate iOS release configuration
        script: |
          sh scripts/validate_ios_release.sh

      - name: Provision Firebase iOS plist (optional for screenshot mode)
        script: |
          set -e
          if [ -n "$FIREBASE_IOS_PLIST_BASE64" ]; then
            echo "$FIREBASE_IOS_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "Using real Firebase iOS plist from secret."
          else
            cat > ios/Runner/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>stub-api-key</string>
            <key>BUNDLE_ID</key>
            <string>com.voolo.jetx</string>
            <key>GCM_SENDER_ID</key>
            <string>1234567890</string>
            <key>GOOGLE_APP_ID</key>
            <string>1:1234567890:ios:1234567890abcdef123456</string>
            <key>PROJECT_ID</key>
            <string>stub-project-id</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>com.googleusercontent.apps.1234567890-abcdef</string>
            <key>STORAGE_BUCKET</key>
            <string>stub-project-id.appspot.com</string>
          </dict>
          </plist>
          EOF
            echo "Using stub Firebase plist for screenshot mode."
          fi

      - name: Resolve available iOS simulator
        script: |
          set -e
          LINE="$(xcrun simctl list devices available | awk -v preferredDevice="$SIMULATOR_DEVICE" -v preferredRuntime="$SIMULATOR_RUNTIME" '
            /^-- iOS / { runtime=$0; gsub(/^-- /, "", runtime); gsub(/ --$/, "", runtime) }
            index(runtime, preferredRuntime) > 0 && index($0, preferredDevice) > 0 { print; exit }
          ')"
          if [ -z "$LINE" ]; then
            LINE="$(xcrun simctl list devices available | grep -E 'iPhone [0-9]+' | head -n 1)"
          fi
          if [ -z "$LINE" ]; then
            echo "ERROR: No available iPhone simulator found on this Codemagic machine."
            xcrun simctl list devices available
            exit 1
          fi
          DEVICE="$(echo "$LINE" | sed -E 's/^[[:space:]]*//; s/[[:space:]]*\(.*$//')"
          UDID="$(echo "$LINE" | grep -oE '[0-9A-Fa-f-]{36}' | head -n 1)"
          echo "Resolved simulator device: $DEVICE"
          echo "Resolved simulator udid: $UDID"
          echo "CM_SIMULATOR_DEVICE=$DEVICE" >> "$CM_ENV"
          echo "CM_SIMULATOR_UDID=$UDID" >> "$CM_ENV"

      - name: Boot iOS simulator
        script: |
          set -e
          xcrun simctl shutdown all || true
          xcrun simctl boot "$CM_SIMULATOR_DEVICE" || true
          xcrun simctl bootstatus "$CM_SIMULATOR_DEVICE" -b

      - name: Generate screenshots
        script: |
          set -e
          mkdir -p "$SCREENSHOTS_DIR"
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_store_screenshots_test.dart \
            -d "$CM_SIMULATOR_UDID" \
            --dart-define=SCREENSHOT_MODE=true

      - name: List generated screenshots
        script: |
          set -e
          find build/screenshots -type f -name "*.png" | sed 's|^| - |'

    artifacts:
      - build/screenshots/**/*.png

  ios-screenshots-ipad:
