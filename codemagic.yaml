workflows:
  ios-appstore:
    name: iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        BUNDLE_ID: com.voolo.app
        FIREBASE_IOS_PLIST_PATH: ios/Runner/GoogleService-Info.plist

    integrations:
      app_store_connect: app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Validate iOS release configuration
        script: |
          sh scripts/validate_ios_release.sh

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios
          pod install
          cd ..

      - name: Provision Firebase iOS plist
        script: |
          set -e
          if [ -z "$FIREBASE_IOS_PLIST_BASE64" ]; then
            echo "ERROR: FIREBASE_IOS_PLIST_BASE64 is not set in Codemagic environment variables."
            exit 1
          fi
          echo "$FIREBASE_IOS_PLIST_BASE64" | base64 --decode > "$FIREBASE_IOS_PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :GOOGLE_APP_ID" "$FIREBASE_IOS_PLIST_PATH" >/dev/null
          PLIST_BUNDLE_ID="$(/usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" "$FIREBASE_IOS_PLIST_PATH")"
          if [ "$PLIST_BUNDLE_ID" != "$BUNDLE_ID" ]; then
            echo "ERROR: Firebase iOS plist BUNDLE_ID ($PLIST_BUNDLE_ID) does not match app bundle ($BUNDLE_ID)."
            exit 1
          fi

      - name: Configure iOS URL scheme for Google Sign-In
        script: |
          set -e
          REVERSED_CLIENT_ID="$(/usr/libexec/PlistBuddy -c "Print :REVERSED_CLIENT_ID" "$FIREBASE_IOS_PLIST_PATH")"
          if [ -z "$REVERSED_CLIENT_ID" ]; then
            echo "ERROR: REVERSED_CLIENT_ID not found in Firebase iOS plist."
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleTypeRole string Editor" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED_CLIENT_ID" ios/Runner/Info.plist

      - name: Set up keychain and certificates
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain initialize
          keychain add-certificates

      - name: Debug signing files
        script: |
          echo "Certificates in keychain:"
          keychain list-certificates || true
          echo "Provisioning profiles found:"
          find "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" -maxdepth 1 -type f \( -name "*.mobileprovision" -o -name "*.provisionprofile" \) 2>/dev/null | sed 's|^| - |' || true

      - name: Verify signing settings
        script: |
          xcode-project show-build-settings --project ios/Runner.xcodeproj --scheme Runner | grep -E "CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE_SPECIFIER|PRODUCT_BUNDLE_IDENTIFIER"

      - name: Set unique iOS build number
        script: |
          set -e
          BUILD_NO="${BUILD_NUMBER:-$CM_BUILD_ID}"
          if [ -z "$BUILD_NO" ]; then
            BUILD_NO="$(date +%s)"
          fi
          echo "CM_FLUTTER_BUILD_NUMBER=$BUILD_NO" >> "$CM_ENV"
          echo "Using iOS build number: $BUILD_NO"

      - name: Build signed IPA
        script: |
          set -e
          flutter build ipa --release --no-codesign \
            --build-number="$CM_FLUTTER_BUILD_NUMBER"

      - name: Export signed IPA with App Store profile
        script: |
          set -e
          mkdir -p build/ios/ipa

          ARCHIVE_PATH="$(find build/ios/archive -maxdepth 1 -type d -name '*.xcarchive' | head -n 1)"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "ERROR: xcarchive not found after flutter build."
            exit 1
          fi

          PROFILE_PATH="$(find "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" -maxdepth 1 -type f \( -name '*.mobileprovision' -o -name '*.provisionprofile' \) -size +1c 2>/dev/null | head -n 1)"
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found in Codemagic machine."
            echo "Checked paths:"
            echo " - $HOME/Library/MobileDevice/Provisioning Profiles"
            echo " - $HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
            exit 1
          fi

          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)"
          if [ -z "$PROFILE_NAME" ]; then
            echo "ERROR: Could not read provisioning profile name."
            exit 1
          fi

          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>VYJN27MQ6V</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Validate and collect IPA
        script: |
          echo "Listing iOS build outputs..."
          find build/ios -type f | sed 's|^| - |'

          IPA_PATH="$(find build/ios -type f -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa file was generated."
            exit 1
          fi

          mkdir -p build/ios/ipa
          cp "$IPA_PATH" build/ios/ipa/Runner.ipa
          find build/ios/ipa -type f -name '*.ipa' ! -name 'Runner.ipa' -delete
          echo "IPA ready at build/ios/ipa/Runner.ipa"

    artifacts:
      - build/ios/ipa/Runner.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  ios-screenshots:
    name: iOS Screenshots
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        SIMULATOR_DEVICE: "iPhone 14 Pro"
        SIMULATOR_RUNTIME: "iOS 16.2"
        SCREENSHOTS_DIR: "build/screenshots/iphone_69"

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Validate iOS release configuration
        script: |
          sh scripts/validate_ios_release.sh

      - name: Provision Firebase iOS plist (optional for screenshot mode)
        script: |
          set -e
          if [ -n "$FIREBASE_IOS_PLIST_BASE64" ]; then
            echo "$FIREBASE_IOS_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "Using real Firebase iOS plist from secret."
          else
            cat > ios/Runner/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>BUNDLE_ID</key>
            <string>com.voolo.app</string>
            <key>GOOGLE_APP_ID</key>
            <string>stub-google-app-id</string>
            <key>PROJECT_ID</key>
            <string>stub-project-id</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>stub-reversed-client-id</string>
          </dict>
          </plist>
          EOF
            echo "Using stub Firebase plist for screenshot mode."
          fi

      - name: Resolve available iOS simulator
        script: |
          set -e
          LINE="$(xcrun simctl list devices available | awk -v preferredDevice="$SIMULATOR_DEVICE" -v preferredRuntime="$SIMULATOR_RUNTIME" '
            /^-- iOS / { runtime=$0; gsub(/^-- /, "", runtime); gsub(/ --$/, "", runtime) }
            index(runtime, preferredRuntime) > 0 && index($0, preferredDevice) > 0 { print; exit }
          ')"
          if [ -z "$LINE" ]; then
            LINE="$(xcrun simctl list devices available | grep -E 'iPhone [0-9]+' | head -n 1)"
          fi
          if [ -z "$LINE" ]; then
            echo "ERROR: No available iPhone simulator found on this Codemagic machine."
            xcrun simctl list devices available
            exit 1
          fi
          DEVICE="$(echo "$LINE" | sed -E 's/^[[:space:]]*//; s/[[:space:]]*\(.*$//')"
          UDID="$(echo "$LINE" | grep -oE '[0-9A-Fa-f-]{36}' | head -n 1)"
          echo "Resolved simulator device: $DEVICE"
          echo "Resolved simulator udid: $UDID"
          echo "CM_SIMULATOR_DEVICE=$DEVICE" >> "$CM_ENV"
          echo "CM_SIMULATOR_UDID=$UDID" >> "$CM_ENV"

      - name: Boot iOS simulator
        script: |
          set -e
          xcrun simctl shutdown all || true
          xcrun simctl boot "$CM_SIMULATOR_DEVICE" || true
          xcrun simctl bootstatus "$CM_SIMULATOR_DEVICE" -b

      - name: Generate screenshots
        script: |
          set -e
          mkdir -p "$SCREENSHOTS_DIR"
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_store_screenshots_test.dart \
            -d "$CM_SIMULATOR_DEVICE" \
            --dart-define=SCREENSHOT_MODE=true

      - name: List generated screenshots
        script: |
          set -e
          find build/screenshots -type f -name "*.png" | sed 's|^| - |'

    artifacts:
      - build/screenshots/**/*.png

  ios-app-preview:
    name: iOS App Preview
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        SIMULATOR_DEVICE: "iPhone 14 Pro"
        SIMULATOR_RUNTIME: "iOS 16.2"

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Validate iOS release configuration
        script: |
          sh scripts/validate_ios_release.sh

      - name: Resolve available iOS simulator
        script: |
          set -e
          LINE="$(xcrun simctl list devices available | awk -v preferredDevice="$SIMULATOR_DEVICE" -v preferredRuntime="$SIMULATOR_RUNTIME" '
            /^-- iOS / { runtime=$0; gsub(/^-- /, "", runtime); gsub(/ --$/, "", runtime) }
            index(runtime, preferredRuntime) > 0 && index($0, preferredDevice) > 0 { print; exit }
          ')"
          if [ -z "$LINE" ]; then
            LINE="$(xcrun simctl list devices available | grep -E 'iPhone [0-9]+' | head -n 1)"
          fi
          if [ -z "$LINE" ]; then
            echo "ERROR: No available iPhone simulator found on this Codemagic machine."
            xcrun simctl list devices available
            exit 1
          fi
          DEVICE="$(echo "$LINE" | sed -E 's/^[[:space:]]*//; s/[[:space:]]*\(.*$//')"
          UDID="$(echo "$LINE" | grep -oE '[0-9A-Fa-f-]{36}' | head -n 1)"
          echo "Resolved simulator device: $DEVICE"
          echo "Resolved simulator udid: $UDID"
          echo "CM_SIMULATOR_DEVICE=$DEVICE" >> "$CM_ENV"
          echo "CM_SIMULATOR_UDID=$UDID" >> "$CM_ENV"

      - name: Provision stub Firebase plist for preview stability
        script: |
          set -e
          cat > ios/Runner/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>BUNDLE_ID</key>
            <string>com.voolo.app</string>
            <key>GOOGLE_APP_ID</key>
            <string>stub-google-app-id</string>
            <key>PROJECT_ID</key>
            <string>stub-project-id</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>stub-reversed-client-id</string>
          </dict>
          </plist>
          EOF
          echo "Preview uses screenshot mode (no live Firebase init)."

      - name: Prepare Flutter iOS config and Pods
        script: |
          set -e
          /usr/libexec/PlistBuddy -c "Delete :PREVIEW_STABLE_MODE" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :PREVIEW_STABLE_MODE bool true" ios/Runner/Info.plist
          cd ios
          pod install
          cd ..

      - name: Build iOS simulator .app for App Preview
        script: |
          set -e
          flutter build ios --simulator --debug --no-codesign \
            --dart-define=PREVIEW_STABLE_MODE=true
          find build/ios/iphonesimulator -type d -name "*.app" | sed 's|^| - |'

      - name: Collect app startup runtime logs
        script: |
          set -e
          TARGET="$CM_SIMULATOR_UDID"
          if [ -z "$TARGET" ]; then
            TARGET="$CM_SIMULATOR_DEVICE"
          fi
          APP_PATH="$(find build/ios/iphonesimulator -type d -name 'Runner.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found."
            exit 1
          fi

          mkdir -p build
          xcrun simctl shutdown all || true
          xcrun simctl boot "$TARGET" || true
          xcrun simctl bootstatus "$TARGET" -b

          xcrun simctl uninstall "$TARGET" com.voolo.app || true
          xcrun simctl install "$TARGET" "$APP_PATH"

          (xcrun simctl spawn "$TARGET" log stream --style compact --level debug --predicate 'process == "Runner"' > build/preview_runtime.log 2>&1) &
          LOG_PID=$!
          sleep 2

          xcrun simctl launch "$TARGET" com.voolo.app > build/preview_launch.log 2>&1
          sleep 15

          if ! xcrun simctl spawn "$TARGET" launchctl list | grep -F "com.voolo.app" >/dev/null; then
            echo "ERROR: Preview app exited right after launch."
            echo "=== preview_launch.log ==="
            cat build/preview_launch.log || true
            echo "=== preview_runtime.log (tail) ==="
            tail -n 200 build/preview_runtime.log || true
            exit 1
          fi

          kill "$LOG_PID" || true
          wait "$LOG_PID" || true

          echo "=== preview_launch.log ==="
          cat build/preview_launch.log || true
          echo "=== preview_runtime.log (tail) ==="
          tail -n 200 build/preview_runtime.log || true

    artifacts:
      - build/ios/iphonesimulator/**/*.app
      - build/preview_runtime.log
      - build/preview_launch.log
